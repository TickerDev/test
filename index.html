<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tower of Hanoi</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --border: #2a2a4a;
    --text: #e0e0f0;
    --text-dim: #8888aa;
    --accent: #6c63ff;
    --accent-glow: rgba(108,99,255,.35);
    --gold: #ffd369;
    --success: #4ade80;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 2rem 1rem 1rem;
  }
  header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: -.5px;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  header p {
    color: var(--text-dim);
    margin-top: .4rem;
    font-size: .95rem;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    margin: 1.2rem 0;
  }
  .controls label {
    font-size: .9rem;
    color: var(--text-dim);
  }
  .controls select, .controls button {
    font-family: inherit;
    font-size: .95rem;
    border: none;
    border-radius: .5rem;
    cursor: pointer;
    transition: all .2s;
  }
  .controls select {
    background: var(--surface);
    color: var(--text);
    padding: .5rem .8rem;
    border: 1px solid var(--border);
    outline: none;
  }
  .controls select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .btn {
    padding: .55rem 1.4rem;
    border-radius: .5rem;
    font-weight: 600;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: .95rem;
    transition: all .2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }

  /* ── Stats bar ── */
  .stats {
    display: flex;
    gap: 2rem;
    justify-content: center;
    margin-bottom: 1rem;
    font-size: .9rem;
  }
  .stats span { color: var(--text-dim); }
  .stats strong { color: var(--gold); font-variant-numeric: tabular-nums; }

  /* ── Game board ── */
  .board {
    display: flex;
    justify-content: center;
    gap: 2rem;
    padding: 0 1rem 2rem;
    width: 100%;
    max-width: 900px;
  }

  .tower {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    position: relative;
    min-height: 280px;
    transition: transform .15s;
  }
  .tower:hover { transform: translateY(-2px); }
  .tower.selected .pole { background: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
  .tower.hint-source .pole { background: var(--gold); box-shadow: 0 0 12px rgba(255,211,105,.4); }
  .tower.hint-target .pole { background: var(--success); box-shadow: 0 0 12px rgba(74,222,128,.4); }

  .tower-label {
    font-size: .8rem;
    color: var(--text-dim);
    margin-bottom: .5rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }

  .pole {
    width: 6px;
    height: 180px;
    background: var(--border);
    border-radius: 3px 3px 0 0;
    position: absolute;
    bottom: 30px;
    transition: background .25s, box-shadow .25s;
  }

  .base {
    width: 90%;
    max-width: 200px;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    position: absolute;
    bottom: 24px;
  }

  .disks {
    position: absolute;
    bottom: 32px;
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    gap: 3px;
    width: 100%;
  }

  .disk {
    height: 26px;
    border-radius: 13px;
    transition: all .3s cubic-bezier(.34,1.56,.64,1);
    position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  .disk.lifting {
    transform: translateY(-30px) scale(1.05);
    filter: brightness(1.2);
  }

  /* ── Win overlay ── */
  .win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,15,26,.85);
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity .4s;
  }
  .win-overlay.show { opacity: 1; pointer-events: all; }
  .win-overlay h2 {
    font-size: 2.4rem;
    background: linear-gradient(135deg, var(--gold), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: .5rem;
  }
  .win-overlay p { color: var(--text-dim); margin-bottom: 1.5rem; font-size: 1.1rem; }

  /* ── Timer ── */
  .timer { font-variant-numeric: tabular-nums; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .board { gap: .8rem; }
    header h1 { font-size: 1.6rem; }
    .pole { height: 140px; }
    .tower { min-height: 220px; }
    .disk { height: 22px; }
  }
</style>
</head>
<body>

<header>
  <h1>Tower of Hanoi</h1>
  <p>Move all disks from the first peg to the last peg</p>
</header>

<div class="controls">
  <label for="disk-count">Disks:</label>
  <select id="disk-count"></select>
  <button class="btn btn-primary" id="new-game">New Game</button>
  <button class="btn btn-ghost" id="undo-btn" disabled>Undo</button>
  <button class="btn btn-ghost" id="hint-btn">Hint</button>
</div>

<div class="stats">
  <span>Moves: <strong id="move-count">0</strong></span>
  <span>Minimum: <strong id="min-moves">0</strong></span>
  <span class="timer">Time: <strong id="timer">0:00</strong></span>
</div>

<div class="board" id="board"></div>

<div class="win-overlay" id="win-overlay">
  <h2>Congratulations!</h2>
  <p id="win-msg"></p>
  <button class="btn btn-primary" id="play-again">Play Again</button>
</div>

<script>
const DISK_COLORS = [
  '#6c63ff','#ff6b6b','#ffd369','#4ade80','#38bdf8',
  '#f472b6','#fb923c','#a78bfa','#2dd4bf','#e879f9'
];

let towers = [[], [], []];
let selected = null;
let moves = 0;
let history = [];
let timerInterval = null;
let seconds = 0;
let diskCount = 3;

const $ = id => document.getElementById(id);

// Populate disk selector (3–10)
const sel = $('disk-count');
for (let i = 3; i <= 10; i++) {
  const o = document.createElement('option');
  o.value = i; o.textContent = i;
  if (i === 3) o.selected = true;
  sel.appendChild(o);
}

function initGame() {
  diskCount = +sel.value;
  towers = [[], [], []];
  for (let i = diskCount; i >= 1; i--) towers[0].push(i);
  selected = null;
  moves = 0;
  history = [];
  seconds = 0;
  clearInterval(timerInterval);
  timerInterval = null;
  $('move-count').textContent = 0;
  $('min-moves').textContent = (1 << diskCount) - 1;
  $('timer').textContent = '0:00';
  $('undo-btn').disabled = true;
  $('win-overlay').classList.remove('show');
  clearHints();
  render();
}

function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    seconds++;
    const m = Math.floor(seconds / 60);
    const s = (seconds % 60).toString().padStart(2, '0');
    $('timer').textContent = `${m}:${s}`;
  }, 1000);
}

function render() {
  const board = $('board');
  board.innerHTML = '';
  const labels = ['A', 'B', 'C'];

  towers.forEach((disks, ti) => {
    const tower = document.createElement('div');
    tower.className = 'tower' + (selected === ti ? ' selected' : '');
    tower.dataset.index = ti;
    tower.addEventListener('click', () => handleClick(ti));

    tower.innerHTML = `
      <span class="tower-label">${labels[ti]}</span>
      <div class="pole"></div>
      <div class="base"></div>
      <div class="disks"></div>
    `;

    const container = tower.querySelector('.disks');
    const maxW = 85; // percent of tower width
    const minW = 25;

    disks.forEach((size, di) => {
      const disk = document.createElement('div');
      disk.className = 'disk';
      const pct = minW + (size - 1) / (diskCount - 1 || 1) * (maxW - minW);
      disk.style.width = pct + '%';
      disk.style.background = `linear-gradient(135deg, ${DISK_COLORS[(size - 1) % DISK_COLORS.length]}, ${adjustColor(DISK_COLORS[(size - 1) % DISK_COLORS.length], -30)})`;
      // Lift animation for top disk of selected tower
      if (selected === ti && di === disks.length - 1) {
        disk.classList.add('lifting');
      }
      container.appendChild(disk);
    });

    board.appendChild(tower);
  });
}

function adjustColor(hex, amount) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, Math.min(255, r + amount));
  g = Math.max(0, Math.min(255, g + amount));
  b = Math.max(0, Math.min(255, b + amount));
  return `rgb(${r},${g},${b})`;
}

function handleClick(ti) {
  clearHints();
  if (selected === null) {
    if (towers[ti].length === 0) return;
    selected = ti;
  } else if (selected === ti) {
    selected = null;
  } else {
    const from = towers[selected];
    const to = towers[ti];
    const disk = from[from.length - 1];
    if (to.length > 0 && to[to.length - 1] < disk) {
      // Invalid move — shake
      selected = null;
    } else {
      startTimer();
      history.push({ from: selected, to: ti });
      from.pop();
      to.push(disk);
      moves++;
      $('move-count').textContent = moves;
      $('undo-btn').disabled = false;
      selected = null;
      if (checkWin()) {
        clearInterval(timerInterval);
        showWin();
      }
    }
  }
  render();
}

function undo() {
  if (history.length === 0) return;
  const last = history.pop();
  const disk = towers[last.to].pop();
  towers[last.from].push(disk);
  moves++;
  $('move-count').textContent = moves;
  if (history.length === 0) $('undo-btn').disabled = true;
  selected = null;
  clearHints();
  render();
}

function checkWin() {
  return towers[2].length === diskCount;
}

function showWin() {
  const min = (1 << diskCount) - 1;
  const m = Math.floor(seconds / 60);
  const s = (seconds % 60).toString().padStart(2, '0');
  const rating = moves === min ? 'Perfect!' : moves <= min * 1.5 ? 'Great job!' : 'Well done!';
  $('win-msg').textContent = `${rating} Solved in ${moves} moves (${m}:${s}) — minimum was ${min}.`;
  $('win-overlay').classList.add('show');
}

// ── Hint system (iterative Frame-Stewart / simple recursive optimal) ──
function getOptimalMove() {
  // Simulate optimal solution and find the next move that matches current state
  // Use recursive approach: find the first move from optimal sequence
  const state = towers.map(t => [...t]);
  return solveStep(state, diskCount, 0, 2, 1);
}

function solveStep(state, n, from, to, aux) {
  if (n === 0) return null;
  // Check if disk n is already on target
  const diskPos = findDisk(state, n);
  if (diskPos === to) {
    // This disk is done, solve sub-problem for n-1
    return solveStep(state, n - 1, from === to ? aux : from, to, from === to ? from : aux);
  }
  // Need to move disk n to target. First, move n-1 disks to aux
  const actualAux = 3 - diskPos - to; // the peg that's neither source nor target
  // Check if n-1 sub-problem disks are all on aux already
  const subResult = solveStep(state, n - 1, diskPos === from ? from : diskPos, actualAux, to);
  if (subResult !== null) return subResult;
  // n-1 disks are on aux, move disk n
  return { from: diskPos, to: to };
}

function findDisk(state, size) {
  for (let i = 0; i < 3; i++) {
    if (state[i].includes(size)) return i;
  }
  return -1;
}

function clearHints() {
  document.querySelectorAll('.tower').forEach(t => {
    t.classList.remove('hint-source', 'hint-target');
  });
}

function showHint() {
  clearHints();
  if (checkWin()) return;
  const move = getOptimalMove();
  if (!move) return;
  // Re-render first to clear selected
  selected = null;
  render();
  setTimeout(() => {
    const towerEls = document.querySelectorAll('.tower');
    towerEls[move.from]?.classList.add('hint-source');
    towerEls[move.to]?.classList.add('hint-target');
  }, 50);
}

// ── Events ──
$('new-game').addEventListener('click', initGame);
$('play-again').addEventListener('click', initGame);
$('undo-btn').addEventListener('click', undo);
$('hint-btn').addEventListener('click', showHint);

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key === '1' || e.key === 'a') handleClick(0);
  else if (e.key === '2' || e.key === 'b') handleClick(1);
  else if (e.key === '3' || e.key === 'c') handleClick(2);
  else if (e.key === 'u' || (e.ctrlKey && e.key === 'z')) { e.preventDefault(); undo(); }
  else if (e.key === 'h') showHint();
  else if (e.key === 'n') initGame();
});

initGame();
</script>
</body>
</html>
