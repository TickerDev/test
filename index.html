<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tower of Hanoi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    /* Surface hierarchy */
    --surface-lowest: #ffffff;
    --surface: #f8f9fa;
    --surface-low: #f3f4f5;
    --surface-container: #edeeef;
    --surface-high: #e1e3e4;

    /* Text */
    --on-surface: #191c1d;
    --on-surface-variant: #414754;

    /* Accent */
    --primary: #005bbf;
    --primary-container: #1a73e8;
    --on-primary: #ffffff;

    /* Feedback */
    --success: #1e8e5f;
    --danger: #c5221f;
    --danger-soft: rgba(197,34,31,.06);

    /* Utility */
    --outline-variant: rgba(193,198,214,.15);
    --ambient-shadow: rgba(25,28,29,.06);
    --radius-lg: 2rem;
    --radius-xl: 3rem;
    --radius-full: 9999px;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--surface);
    color: var(--on-surface);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 3.5rem 2.75rem 0;
  }
  header h1 {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 3.5rem;
    font-weight: 700;
    letter-spacing: -0.035em;
    color: var(--on-surface);
    line-height: 1.1;
  }
  header p {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--on-surface-variant);
    margin-top: .75rem;
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.6;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: .75rem;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    margin: 2.5rem 0 2rem;
  }
  .disk-input-group {
    display: flex;
    align-items: center;
    gap: .4rem;
    background: var(--surface-low);
    border-radius: var(--radius-full);
    padding: .25rem .25rem .25rem .9rem;
    transition: background .2s;
  }
  .disk-input-group:focus-within {
    background: var(--surface-lowest);
    box-shadow: 0 0 0 1.5px var(--primary);
  }
  .disk-input-group label {
    font-size: .75rem;
    color: var(--on-surface-variant);
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: .08em;
    font-weight: 500;
  }
  .disk-input-group input {
    width: 2.8rem;
    background: transparent;
    border: none;
    color: var(--on-surface);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: .95rem;
    font-weight: 600;
    text-align: center;
    padding: .45rem 0;
    outline: none;
  }
  .disk-input-group input::-webkit-inner-spin-button { display: none; }
  .disk-stepper {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .disk-stepper button {
    background: var(--surface-container);
    border: none;
    color: var(--on-surface-variant);
    font-size: .5rem;
    width: 1.6rem;
    height: 1.05rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
  }
  .disk-stepper button:first-child { border-radius: var(--radius-full) var(--radius-full) 0 0; }
  .disk-stepper button:last-child { border-radius: 0 0 var(--radius-full) var(--radius-full); }
  .disk-stepper button:hover { background: var(--primary); color: var(--on-primary); }

  .btn {
    padding: .65rem 1.5rem;
    border-radius: var(--radius-full);
    font-weight: 600;
    border: none;
    cursor: pointer;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: .85rem;
    transition: all .2s;
    letter-spacing: -.01em;
  }
  .btn-primary {
    background: var(--primary);
    color: var(--on-primary);
    box-shadow: 0 2px 40px var(--ambient-shadow);
  }
  .btn-primary:hover {
    background: var(--primary-container);
    box-shadow: 0 4px 48px rgba(25,28,29,.1);
  }
  .btn-ghost {
    background: transparent;
    color: var(--primary);
    box-shadow: inset 0 0 0 1.5px var(--outline-variant);
  }
  .btn-ghost:hover {
    box-shadow: inset 0 0 0 1.5px rgba(0,91,191,.25);
    background: rgba(0,91,191,.04);
  }
  .btn-ghost:disabled { opacity: .3; cursor: default; }
  .btn-ghost:disabled:hover {
    box-shadow: inset 0 0 0 1.5px var(--outline-variant);
    background: transparent;
  }

  /* ── Stats ── */
  .stats {
    display: flex;
    gap: 2.5rem;
    justify-content: center;
    margin-bottom: 2rem;
    font-size: .75rem;
    color: var(--on-surface-variant);
    text-transform: uppercase;
    letter-spacing: .08em;
    font-weight: 500;
  }
  .stats strong {
    color: var(--on-surface);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-variant-numeric: tabular-nums;
    margin-left: .35rem;
    font-weight: 600;
    font-size: .85rem;
    letter-spacing: -.01em;
    text-transform: none;
  }

  /* ── Board ── */
  .board {
    display: flex;
    justify-content: center;
    gap: 1.25rem;
    padding: 0 2.75rem 3.5rem;
    width: 100%;
    max-width: 1040px;
    position: relative;
  }

  .tower {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    min-height: 300px;
    border-radius: var(--radius-lg);
    background: var(--surface-lowest);
    box-shadow: 0 8px 48px var(--ambient-shadow);
    transition: background .25s, box-shadow .25s;
    cursor: pointer;
  }
  .tower:hover {
    box-shadow: 0 12px 56px rgba(25,28,29,.09);
  }
  .tower.drop-target {
    background: rgba(0,91,191,.04);
    box-shadow: 0 0 0 2px rgba(0,91,191,.2), 0 12px 56px rgba(25,28,29,.09);
  }
  .tower.drop-invalid {
    background: var(--danger-soft);
    box-shadow: 0 0 0 2px rgba(197,34,31,.15), 0 12px 56px rgba(25,28,29,.09);
  }
  .tower.selected .pole {
    background: var(--primary);
    box-shadow: 0 0 20px rgba(0,91,191,.2);
  }

  .tower-label {
    font-size: .7rem;
    color: var(--on-surface-variant);
    margin-top: 1rem;
    text-transform: uppercase;
    letter-spacing: .1em;
    font-weight: 600;
    opacity: .6;
  }

  .pole {
    width: 3px;
    background: var(--surface-high);
    border-radius: 2px 2px 0 0;
    position: absolute;
    bottom: 28px;
    transition: background .25s, box-shadow .25s;
  }

  .base-line {
    width: 60%;
    max-width: 180px;
    height: 3px;
    background: var(--surface-high);
    border-radius: 2px;
    position: absolute;
    bottom: 26px;
    transition: background .25s, box-shadow .25s;
  }

  .disks {
    position: absolute;
    bottom: 31px;
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    gap: 3px;
    width: 100%;
  }

  .disk {
    height: 26px;
    border-radius: var(--radius-full);
    position: relative;
    cursor: grab;
    transition: transform .3s cubic-bezier(.22,1,.36,1), opacity .2s, box-shadow .25s;
  }
  .disk:active { cursor: grabbing; }
  .disk.top-disk:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 40px var(--ambient-shadow);
  }
  .disk.lifting {
    transform: translateY(-30px) scale(1.04);
    box-shadow: 0 12px 48px var(--ambient-shadow);
  }

  /* Drag ghost */
  .drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    height: 26px;
    border-radius: var(--radius-full);
    opacity: .92;
    box-shadow: 0 12px 48px var(--ambient-shadow);
    transition: none;
  }

  /* ── Win overlay ── */
  .win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity .4s;
  }
  .win-overlay.show { opacity: 1; pointer-events: all; }
  .win-overlay h2 {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--on-surface);
    letter-spacing: -.02em;
    margin-bottom: .5rem;
  }
  .win-overlay p {
    color: var(--on-surface-variant);
    margin-bottom: 2rem;
    font-size: 1rem;
    line-height: 1.6;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header { padding: 2.75rem 1.5rem 0; }
    header h1 { font-size: 2.25rem; }
    .board { gap: .6rem; padding: 0 1rem 2.75rem; }
    .tower { min-height: 240px; border-radius: 1.25rem; }
    .disk { height: 22px; }
    .controls { margin: 2rem 0 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Tower of Hanoi</h1>
  <p>Move all disks to the last peg</p>
</header>

<div class="controls">
  <div class="disk-input-group">
    <label for="disk-count">Disks</label>
    <input type="number" id="disk-count" value="3" min="1" max="99">
    <div class="disk-stepper">
      <button id="disk-up" aria-label="Increase">&#9650;</button>
      <button id="disk-down" aria-label="Decrease">&#9660;</button>
    </div>
  </div>
  <button class="btn btn-primary" id="new-game">Start</button>
  <button class="btn btn-ghost" id="undo-btn" disabled>Undo</button>
</div>

<div class="stats">
  <span>Moves<strong id="move-count">0</strong></span>
  <span>Minimum<strong id="min-moves">0</strong></span>
  <span>Time<strong id="timer">0:00</strong></span>
</div>

<div class="board" id="board"></div>

<div class="win-overlay" id="win-overlay">
  <h2>Solved</h2>
  <p id="win-msg"></p>
  <button class="btn btn-primary" id="play-again">Play Again</button>
</div>

<script>
const COLORS = [
  '#005bbf','#c5221f','#e37400','#1e8e5f','#7b1fa2',
  '#0d7377','#a8430f','#1a73e8','#4a6741','#9334e6',
  '#b06000','#0b57d0','#8e3a06','#146c2e','#7627bb'
];

let towers = [[], [], []];
let selected = null;
let moves = 0;
let history = [];
let timerInterval = null;
let seconds = 0;
let diskCount = 3;
let dragging = null;

const $ = id => document.getElementById(id);

// Disk stepper
$('disk-up').addEventListener('click', () => { const inp = $('disk-count'); inp.value = Math.min(99, +inp.value + 1); });
$('disk-down').addEventListener('click', () => { const inp = $('disk-count'); inp.value = Math.max(1, +inp.value - 1); });

function getDiskCount() {
  return Math.max(1, Math.min(99, +$('disk-count').value || 3));
}

function initGame() {
  diskCount = getDiskCount();
  $('disk-count').value = diskCount;
  towers = [[], [], []];
  for (let i = diskCount; i >= 1; i--) towers[0].push(i);
  selected = null;
  moves = 0;
  history = [];
  seconds = 0;
  clearInterval(timerInterval);
  timerInterval = null;
  $('move-count').textContent = 0;
  $('min-moves').textContent = diskCount <= 30 ? ((1 << diskCount) - 1).toLocaleString() : '2^' + diskCount + '-1';
  $('timer').textContent = '0:00';
  $('undo-btn').disabled = true;
  $('win-overlay').classList.remove('show');

  render();
}

function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    seconds++;
    const m = Math.floor(seconds / 60);
    const s = (seconds % 60).toString().padStart(2, '0');
    $('timer').textContent = `${m}:${s}`;
  }, 1000);
}

function diskColor(size) {
  return COLORS[(size - 1) % COLORS.length];
}

function poleHeight() {
  return Math.max(160, diskCount * 29 + 40);
}

function render() {
  const board = $('board');
  board.innerHTML = '';
  const labels = ['A', 'B', 'C'];
  const ph = poleHeight();

  towers.forEach((disks, ti) => {
    const tower = document.createElement('div');
    tower.className = 'tower' + (selected === ti ? ' selected' : '');
    tower.style.minHeight = (ph + 70) + 'px';
    tower.dataset.index = ti;

    tower.addEventListener('click', e => {
      if (dragging) return;
      handleClick(ti);
    });

    tower.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    });
    tower.addEventListener('drop', e => {
      e.preventDefault();
      tower.classList.remove('drop-target', 'drop-invalid');
      if (!dragging) return;
      tryMove(dragging.towerIdx, ti);
      cleanupDrag();
    });

    tower.innerHTML = `
      <span class="tower-label">${labels[ti]}</span>
      <div class="pole" style="height:${ph}px"></div>
      <div class="base-line"></div>
      <div class="disks"></div>
    `;

    const container = tower.querySelector('.disks');
    const maxW = 80;
    const minW = 20;

    disks.forEach((size, di) => {
      const disk = document.createElement('div');
      disk.className = 'disk';
      const isTop = di === disks.length - 1;
      if (isTop) disk.classList.add('top-disk');
      const pct = diskCount === 1 ? 55 : minW + (size - 1) / (diskCount - 1) * (maxW - minW);
      disk.style.width = pct + '%';
      const c = diskColor(size);
      disk.style.background = c;
      disk.style.boxShadow = `0 4px 24px ${c}18`;

      if (selected === ti && isTop) {
        disk.classList.add('lifting');
      }

      if (isTop) {
        disk.draggable = true;
        disk.addEventListener('dragstart', e => {
          dragging = { towerIdx: ti, diskSize: size };
          e.dataTransfer.effectAllowed = 'move';
          const ghost = document.createElement('div');
          ghost.className = 'drag-ghost';
          ghost.style.width = disk.offsetWidth + 'px';
          ghost.style.background = c;
          ghost.style.left = '-9999px';
          ghost.style.top = '-9999px';
          document.body.appendChild(ghost);
          e.dataTransfer.setDragImage(ghost, ghost.offsetWidth / 2, 13);
          dragging.ghostEl = ghost;
          setTimeout(() => { disk.style.opacity = '0.3'; }, 0);
        });
        disk.addEventListener('dragend', () => {
          disk.style.opacity = '';
          cleanupDrag();
          document.querySelectorAll('.tower').forEach(t => t.classList.remove('drop-target', 'drop-invalid'));
        });
      }

      container.appendChild(disk);
    });

    let dragEnterCount = 0;
    tower.addEventListener('dragenter', e => {
      e.preventDefault();
      dragEnterCount++;
      if (!dragging) return;
      const topDisk = disks.length > 0 ? disks[disks.length - 1] : Infinity;
      if (dragging.diskSize > topDisk) {
        tower.classList.add('drop-invalid');
        tower.classList.remove('drop-target');
      } else {
        tower.classList.add('drop-target');
        tower.classList.remove('drop-invalid');
      }
    });
    tower.addEventListener('dragleave', () => {
      dragEnterCount--;
      if (dragEnterCount <= 0) {
        dragEnterCount = 0;
        tower.classList.remove('drop-target', 'drop-invalid');
      }
    });

    board.appendChild(tower);
  });

  setupTouchDrag();
}

function cleanupDrag() {
  if (dragging?.ghostEl) {
    dragging.ghostEl.remove();
  }
  dragging = null;
}

// ── Touch drag support ──
function setupTouchDrag() {
  const topDisks = document.querySelectorAll('.disk.top-disk');
  topDisks.forEach(disk => {
    disk.addEventListener('touchstart', handleTouchStart, { passive: false });
  });
}

let touchDrag = null;

function handleTouchStart(e) {
  const disk = e.currentTarget;
  const tower = disk.closest('.tower');
  const ti = +tower.dataset.index;
  const size = towers[ti][towers[ti].length - 1];
  if (!size) return;

  e.preventDefault();
  const touch = e.touches[0];
  const rect = disk.getBoundingClientRect();

  const ghost = document.createElement('div');
  ghost.className = 'drag-ghost';
  ghost.style.width = rect.width + 'px';
  ghost.style.background = diskColor(size);
  ghost.style.left = (touch.clientX - rect.width / 2) + 'px';
  ghost.style.top = (touch.clientY - 13) + 'px';
  document.body.appendChild(ghost);

  disk.style.opacity = '0.3';

  touchDrag = {
    towerIdx: ti,
    diskSize: size,
    ghostEl: ghost,
    diskEl: disk,
    offsetX: rect.width / 2,
  };

  document.addEventListener('touchmove', handleTouchMove, { passive: false });
  document.addEventListener('touchend', handleTouchEnd);
}

function handleTouchMove(e) {
  if (!touchDrag) return;
  e.preventDefault();
  const touch = e.touches[0];
  touchDrag.ghostEl.style.left = (touch.clientX - touchDrag.offsetX) + 'px';
  touchDrag.ghostEl.style.top = (touch.clientY - 13) + 'px';

  document.querySelectorAll('.tower').forEach(t => t.classList.remove('drop-target', 'drop-invalid'));
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const tower = el?.closest('.tower');
  if (tower) {
    const ti = +tower.dataset.index;
    const topDisk = towers[ti].length > 0 ? towers[ti][towers[ti].length - 1] : Infinity;
    if (touchDrag.diskSize > topDisk) {
      tower.classList.add('drop-invalid');
    } else {
      tower.classList.add('drop-target');
    }
  }
}

function handleTouchEnd(e) {
  if (!touchDrag) return;
  document.removeEventListener('touchmove', handleTouchMove);
  document.removeEventListener('touchend', handleTouchEnd);
  document.querySelectorAll('.tower').forEach(t => t.classList.remove('drop-target', 'drop-invalid'));

  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const tower = el?.closest('.tower');

  touchDrag.diskEl.style.opacity = '';
  touchDrag.ghostEl.remove();

  if (tower) {
    const ti = +tower.dataset.index;
    tryMove(touchDrag.towerIdx, ti);
  }
  touchDrag = null;
}

// ── Move logic ──
function tryMove(fromIdx, toIdx) {
  if (fromIdx === toIdx) return;
  const from = towers[fromIdx];
  const to = towers[toIdx];
  const disk = from[from.length - 1];
  if (!disk) return;
  if (to.length > 0 && to[to.length - 1] < disk) return;

  startTimer();
  history.push({ from: fromIdx, to: toIdx });
  from.pop();
  to.push(disk);
  moves++;
  $('move-count').textContent = moves;
  $('undo-btn').disabled = false;
  selected = null;

  render();
  if (checkWin()) {
    clearInterval(timerInterval);
    showWin();
  }
}

function handleClick(ti) {

  if (selected === null) {
    if (towers[ti].length === 0) return;
    selected = ti;
  } else if (selected === ti) {
    selected = null;
  } else {
    tryMove(selected, ti);
    return;
  }
  render();
}

function undo() {
  if (history.length === 0) return;
  const last = history.pop();
  const disk = towers[last.to].pop();
  towers[last.from].push(disk);
  moves++;
  $('move-count').textContent = moves;
  if (history.length === 0) $('undo-btn').disabled = true;
  selected = null;

  render();
}

function checkWin() {
  return towers[2].length === diskCount;
}

function showWin() {
  const min = diskCount <= 30 ? (1 << diskCount) - 1 : Infinity;
  const m = Math.floor(seconds / 60);
  const s = (seconds % 60).toString().padStart(2, '0');
  let rating;
  if (min !== Infinity) {
    rating = moves === min ? 'Perfect score.' : moves <= min * 1.2 ? 'Excellent.' : 'Well done.';
  } else {
    rating = 'Impressive.';
  }
  const minStr = min !== Infinity ? ` Minimum was ${min.toLocaleString()}.` : '';
  $('win-msg').textContent = `${rating} ${moves.toLocaleString()} moves in ${m}:${s}.${minStr}`;
  $('win-overlay').classList.add('show');
}

// ── Events ──
$('new-game').addEventListener('click', initGame);
$('play-again').addEventListener('click', initGame);
$('undo-btn').addEventListener('click', undo);
$('disk-count').addEventListener('keydown', e => { if (e.key === 'Enter') initGame(); });

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === '1' || e.key === 'a') handleClick(0);
  else if (e.key === '2' || e.key === 'b') handleClick(1);
  else if (e.key === '3' || e.key === 'c') handleClick(2);
  else if (e.key === 'u' || (e.ctrlKey && e.key === 'z')) { e.preventDefault(); undo(); }
  else if (e.key === 'n') initGame();
});

initGame();
</script>
</body>
</html>
