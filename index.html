<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tower of Hanoi</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --bg: #09090b;
    --surface: #18181b;
    --border: #27272a;
    --text: #fafafa;
    --text-dim: #71717a;
    --accent: #a78bfa;
    --accent-dim: rgba(167,139,250,.12);
    --accent-glow: rgba(167,139,250,.25);
    --success: #34d399;
    --danger: #f87171;
    --radius: .75rem;
  }

  body {
    font-family: -apple-system, 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 2.5rem 1rem 0;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -.025em;
    color: var(--text);
  }
  header p {
    color: var(--text-dim);
    margin-top: .25rem;
    font-size: .8rem;
    font-weight: 400;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: .5rem;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    margin: 1.25rem 0 1rem;
  }
  .disk-input-group {
    display: flex;
    align-items: center;
    gap: .35rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: .1rem .1rem .1rem .7rem;
  }
  .disk-input-group label {
    font-size: .8rem;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .disk-input-group input {
    width: 3.2rem;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: inherit;
    font-size: .85rem;
    font-weight: 600;
    text-align: center;
    padding: .45rem .2rem;
    outline: none;
  }
  .disk-input-group input::-webkit-inner-spin-button { display: none; }
  .disk-stepper {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .disk-stepper button {
    background: var(--border);
    border: none;
    color: var(--text-dim);
    font-size: .55rem;
    width: 1.4rem;
    height: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .disk-stepper button:first-child { border-radius: 0 calc(var(--radius) - 2px) 0 0; }
  .disk-stepper button:last-child { border-radius: 0 0 calc(var(--radius) - 2px) 0; }
  .disk-stepper button:hover { background: var(--accent-dim); color: var(--accent); }

  .btn {
    padding: .5rem 1rem;
    border-radius: var(--radius);
    font-weight: 500;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: .8rem;
    transition: all .15s;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-ghost {
    background: var(--surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }
  .btn-ghost:disabled { opacity: .35; cursor: default; }
  .btn-ghost:disabled:hover { border-color: var(--border); color: var(--text-dim); }

  /* ── Stats ── */
  .stats {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin-bottom: 1.25rem;
    font-size: .75rem;
    color: var(--text-dim);
  }
  .stats strong {
    color: var(--text);
    font-variant-numeric: tabular-nums;
    margin-left: .25rem;
  }

  /* ── Board ── */
  .board {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    padding: 0 1rem 2rem;
    width: 100%;
    max-width: 960px;
    position: relative;
  }

  .tower {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    min-height: 300px;
    border-radius: var(--radius);
    transition: background .2s, box-shadow .2s;
    cursor: pointer;
  }
  .tower.drop-target {
    background: var(--accent-dim);
    box-shadow: inset 0 0 0 1.5px var(--accent);
  }
  .tower.drop-invalid {
    background: rgba(248,113,113,.08);
    box-shadow: inset 0 0 0 1.5px var(--danger);
  }
  .tower.selected .pole { background: var(--accent); box-shadow: 0 0 16px var(--accent-glow); }
  .tower.hint-source .pole { background: var(--accent); box-shadow: 0 0 16px var(--accent-glow); }
  .tower.hint-target .base-line { background: var(--success); box-shadow: 0 0 12px rgba(52,211,153,.3); }

  .tower-label {
    font-size: .65rem;
    color: var(--text-dim);
    margin-top: .75rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    font-weight: 500;
  }

  .pole {
    width: 3px;
    background: var(--border);
    border-radius: 2px 2px 0 0;
    position: absolute;
    bottom: 28px;
    transition: background .2s, box-shadow .2s;
  }

  .base-line {
    width: 70%;
    max-width: 200px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    position: absolute;
    bottom: 26px;
    transition: background .2s, box-shadow .2s;
  }

  .disks {
    position: absolute;
    bottom: 31px;
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    gap: 2px;
    width: 100%;
  }

  .disk {
    height: 24px;
    border-radius: 6px;
    position: relative;
    cursor: grab;
    transition: transform .25s cubic-bezier(.22,1,.36,1), opacity .2s, box-shadow .2s;
  }
  .disk:active { cursor: grabbing; }
  .disk.top-disk:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,.4);
  }
  .disk.lifting {
    transform: translateY(-28px) scale(1.03);
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
  }

  /* ── Entrance animation ── */
  .disk.enter {
    animation: diskEnter .4s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes diskEnter {
    from { opacity: 0; transform: translateY(-30px) scaleX(.6); }
    to   { opacity: 1; transform: translateY(0) scaleX(1); }
  }

  /* ── Landing bounce ── */
  .disk.land {
    animation: diskLand .35s cubic-bezier(.22,1,.36,1);
  }
  @keyframes diskLand {
    0%   { transform: scaleY(.85) scaleX(1.08); }
    40%  { transform: scaleY(1.08) scaleX(.96); }
    70%  { transform: scaleY(.97) scaleX(1.02); }
    100% { transform: scaleY(1) scaleX(1); }
  }

  /* ── Flying disk (move animation) ── */
  .disk-fly {
    position: fixed;
    height: 24px;
    border-radius: 6px;
    z-index: 500;
    pointer-events: none;
    will-change: transform;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }

  /* ── Confetti ── */
  .confetti-piece {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    z-index: 200;
    pointer-events: none;
    animation: confettiFall var(--fall-duration, 2.5s) cubic-bezier(.25,.46,.45,.94) forwards;
  }
  @keyframes confettiFall {
    0%   { opacity: 1; transform: translate(0, 0) rotate(0deg) scale(1); }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--drift-x, 50px), var(--drift-y, 600px)) rotate(var(--spin, 720deg)) scale(.4); }
  }

  /* Drag ghost */
  .drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    height: 24px;
    border-radius: 6px;
    opacity: .9;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    transition: none;
  }

  /* ── Win overlay ── */
  .win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(9,9,11,.9);
    backdrop-filter: blur(16px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity .35s;
  }
  .win-overlay.show { opacity: 1; pointer-events: all; }
  .win-overlay h2 {
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: .35rem;
  }
  .win-overlay p {
    color: var(--text-dim);
    margin-bottom: 1.5rem;
    font-size: .9rem;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .board { gap: .6rem; padding: 0 .5rem 2rem; }
    header h1 { font-size: 1.25rem; }
    .tower { min-height: 240px; }
    .disk { height: 20px; }
    .disk-fly { height: 20px; }
  }
</style>
</head>
<body>

<header>
  <h1>Tower of Hanoi</h1>
  <p>Move all disks to the last peg</p>
</header>

<div class="controls">
  <div class="disk-input-group">
    <label for="disk-count">Disks</label>
    <input type="number" id="disk-count" value="3" min="1" max="99">
    <div class="disk-stepper">
      <button id="disk-up" aria-label="Increase">&#9650;</button>
      <button id="disk-down" aria-label="Decrease">&#9660;</button>
    </div>
  </div>
  <button class="btn btn-primary" id="new-game">Start</button>
  <button class="btn btn-ghost" id="undo-btn" disabled>Undo</button>
  <button class="btn btn-ghost" id="hint-btn">Hint</button>
</div>

<div class="stats">
  <span>Moves<strong id="move-count">0</strong></span>
  <span>Minimum<strong id="min-moves">0</strong></span>
  <span>Time<strong id="timer">0:00</strong></span>
</div>

<div class="board" id="board"></div>

<div class="win-overlay" id="win-overlay">
  <h2>Solved</h2>
  <p id="win-msg"></p>
  <button class="btn btn-primary" id="play-again">Play Again</button>
</div>

<script>
const COLORS = [
  '#a78bfa','#f87171','#fbbf24','#34d399','#38bdf8',
  '#f472b6','#fb923c','#818cf8','#2dd4bf','#e879f9',
  '#a3e635','#f9a8d4','#67e8f9','#fca5a5','#bef264'
];

let towers = [[], [], []];
let selected = null;
let moves = 0;
let history = [];
let timerInterval = null;
let seconds = 0;
let diskCount = 3;
let dragging = null; // { towerIdx, diskSize, ghostEl }

const $ = id => document.getElementById(id);

// Disk stepper
$('disk-up').addEventListener('click', () => { const inp = $('disk-count'); inp.value = Math.min(99, +inp.value + 1); });
$('disk-down').addEventListener('click', () => { const inp = $('disk-count'); inp.value = Math.max(1, +inp.value - 1); });

function getDiskCount() {
  return Math.max(1, Math.min(99, +$('disk-count').value || 3));
}

function initGame() {
  diskCount = getDiskCount();
  $('disk-count').value = diskCount;
  towers = [[], [], []];
  for (let i = diskCount; i >= 1; i--) towers[0].push(i);
  selected = null;
  moves = 0;
  history = [];
  seconds = 0;
  clearInterval(timerInterval);
  timerInterval = null;
  $('move-count').textContent = 0;
  $('min-moves').textContent = diskCount <= 30 ? ((1 << diskCount) - 1).toLocaleString() : '2^' + diskCount + '-1';
  $('timer').textContent = '0:00';
  $('undo-btn').disabled = true;
  $('win-overlay').classList.remove('show');
  clearHints();
  render();

  // Staggered entrance animation for disks
  const diskEls = document.querySelectorAll('.tower .disk');
  diskEls.forEach((d, i) => {
    d.classList.add('enter');
    d.style.animationDelay = (i * 60) + 'ms';
    d.addEventListener('animationend', () => { d.classList.remove('enter'); d.style.animationDelay = ''; }, { once: true });
  });
}

function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    seconds++;
    const m = Math.floor(seconds / 60);
    const s = (seconds % 60).toString().padStart(2, '0');
    $('timer').textContent = `${m}:${s}`;
  }, 1000);
}

function diskColor(size) {
  return COLORS[(size - 1) % COLORS.length];
}

function poleHeight() {
  return Math.max(160, diskCount * 26 + 40);
}

function render() {
  const board = $('board');
  board.innerHTML = '';
  const labels = ['A', 'B', 'C'];
  const ph = poleHeight();

  towers.forEach((disks, ti) => {
    const tower = document.createElement('div');
    tower.className = 'tower' + (selected === ti ? ' selected' : '');
    tower.style.minHeight = (ph + 60) + 'px';
    tower.dataset.index = ti;

    // Click support (fallback for non-drag)
    tower.addEventListener('click', e => {
      if (dragging) return;
      handleClick(ti);
    });

    // Drop zone events
    tower.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    });
    tower.addEventListener('drop', e => {
      e.preventDefault();
      tower.classList.remove('drop-target', 'drop-invalid');
      if (!dragging) return;
      tryMove(dragging.towerIdx, ti);
      cleanupDrag();
    });

    tower.innerHTML = `
      <span class="tower-label">${labels[ti]}</span>
      <div class="pole" style="height:${ph}px"></div>
      <div class="base-line"></div>
      <div class="disks"></div>
    `;

    const container = tower.querySelector('.disks');
    const maxW = 82;
    const minW = 18;

    disks.forEach((size, di) => {
      const disk = document.createElement('div');
      disk.className = 'disk';
      const isTop = di === disks.length - 1;
      if (isTop) disk.classList.add('top-disk');
      const pct = diskCount === 1 ? 60 : minW + (size - 1) / (diskCount - 1) * (maxW - minW);
      disk.style.width = pct + '%';
      const c = diskColor(size);
      disk.style.background = c;
      disk.style.boxShadow = `0 2px 8px ${c}33`;

      if (selected === ti && isTop) {
        disk.classList.add('lifting');
      }

      // Drag support for top disk
      if (isTop) {
        disk.draggable = true;
        disk.addEventListener('dragstart', e => {
          dragging = { towerIdx: ti, diskSize: size };
          e.dataTransfer.effectAllowed = 'move';
          // Create ghost
          const ghost = document.createElement('div');
          ghost.className = 'drag-ghost';
          ghost.style.width = disk.offsetWidth + 'px';
          ghost.style.background = c;
          ghost.style.left = '-9999px';
          ghost.style.top = '-9999px';
          document.body.appendChild(ghost);
          e.dataTransfer.setDragImage(ghost, ghost.offsetWidth / 2, 12);
          dragging.ghostEl = ghost;
          setTimeout(() => { disk.style.opacity = '0.3'; }, 0);
        });
        disk.addEventListener('dragend', () => {
          disk.style.opacity = '';
          cleanupDrag();
          document.querySelectorAll('.tower').forEach(t => t.classList.remove('drop-target', 'drop-invalid'));
        });
      }

      container.appendChild(disk);
    });

    // Drag enter/leave visual feedback
    let dragEnterCount = 0;
    tower.addEventListener('dragenter', e => {
      e.preventDefault();
      dragEnterCount++;
      if (!dragging) return;
      const topDisk = disks.length > 0 ? disks[disks.length - 1] : Infinity;
      if (dragging.diskSize > topDisk) {
        tower.classList.add('drop-invalid');
        tower.classList.remove('drop-target');
      } else {
        tower.classList.add('drop-target');
        tower.classList.remove('drop-invalid');
      }
    });
    tower.addEventListener('dragleave', () => {
      dragEnterCount--;
      if (dragEnterCount <= 0) {
        dragEnterCount = 0;
        tower.classList.remove('drop-target', 'drop-invalid');
      }
    });

    board.appendChild(tower);
  });

  // Touch drag support
  setupTouchDrag();
}

function cleanupDrag() {
  if (dragging?.ghostEl) {
    dragging.ghostEl.remove();
  }
  dragging = null;
}

// ── Touch drag support ──
function setupTouchDrag() {
  const topDisks = document.querySelectorAll('.disk.top-disk');
  topDisks.forEach(disk => {
    disk.addEventListener('touchstart', handleTouchStart, { passive: false });
  });
}

let touchDrag = null;

function handleTouchStart(e) {
  const disk = e.currentTarget;
  const tower = disk.closest('.tower');
  const ti = +tower.dataset.index;
  const size = towers[ti][towers[ti].length - 1];
  if (!size) return;

  e.preventDefault();
  const touch = e.touches[0];
  const rect = disk.getBoundingClientRect();

  // Create floating ghost
  const ghost = document.createElement('div');
  ghost.className = 'drag-ghost';
  ghost.style.width = rect.width + 'px';
  ghost.style.background = diskColor(size);
  ghost.style.left = (touch.clientX - rect.width / 2) + 'px';
  ghost.style.top = (touch.clientY - 12) + 'px';
  document.body.appendChild(ghost);

  disk.style.opacity = '0.3';

  touchDrag = {
    towerIdx: ti,
    diskSize: size,
    ghostEl: ghost,
    diskEl: disk,
    offsetX: rect.width / 2,
  };

  document.addEventListener('touchmove', handleTouchMove, { passive: false });
  document.addEventListener('touchend', handleTouchEnd);
}

function handleTouchMove(e) {
  if (!touchDrag) return;
  e.preventDefault();
  const touch = e.touches[0];
  touchDrag.ghostEl.style.left = (touch.clientX - touchDrag.offsetX) + 'px';
  touchDrag.ghostEl.style.top = (touch.clientY - 12) + 'px';

  // Highlight tower under touch
  document.querySelectorAll('.tower').forEach(t => t.classList.remove('drop-target', 'drop-invalid'));
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const tower = el?.closest('.tower');
  if (tower) {
    const ti = +tower.dataset.index;
    const topDisk = towers[ti].length > 0 ? towers[ti][towers[ti].length - 1] : Infinity;
    if (touchDrag.diskSize > topDisk) {
      tower.classList.add('drop-invalid');
    } else {
      tower.classList.add('drop-target');
    }
  }
}

function handleTouchEnd(e) {
  if (!touchDrag) return;
  document.removeEventListener('touchmove', handleTouchMove);
  document.removeEventListener('touchend', handleTouchEnd);
  document.querySelectorAll('.tower').forEach(t => t.classList.remove('drop-target', 'drop-invalid'));

  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const tower = el?.closest('.tower');

  touchDrag.diskEl.style.opacity = '';
  touchDrag.ghostEl.remove();

  if (tower) {
    const ti = +tower.dataset.index;
    tryMove(touchDrag.towerIdx, ti);
  }
  touchDrag = null;
}

// ── Animation state ──
let animating = false;

// ── Move logic ──
function tryMove(fromIdx, toIdx) {
  if (fromIdx === toIdx) return;
  if (animating) return;
  const from = towers[fromIdx];
  const to = towers[toIdx];
  const disk = from[from.length - 1];
  if (!disk) return;
  if (to.length > 0 && to[to.length - 1] < disk) return;

  startTimer();

  // Find source disk element position before state change
  const towerEls = document.querySelectorAll('.tower');
  const srcDiskEl = towerEls[fromIdx]?.querySelector('.disk.top-disk');
  const dstContainer = towerEls[toIdx]?.querySelector('.disks');

  if (srcDiskEl && dstContainer) {
    animating = true;
    const srcRect = srcDiskEl.getBoundingClientRect();
    const dstTowerRect = towerEls[toIdx].getBoundingClientRect();
    const boardRect = $('board').getBoundingClientRect();

    // Calculate target position (center of destination tower, at the stack height)
    const dstStackHeight = to.length * 26 + 31; // where the new disk will sit
    const dstX = dstTowerRect.left + dstTowerRect.width / 2 - srcRect.width / 2;
    const dstY = dstTowerRect.bottom - dstStackHeight - 24;

    // Lift height above the poles
    const liftY = boardRect.top - 10;

    // Create flying disk
    const fly = document.createElement('div');
    fly.className = 'disk-fly';
    fly.style.width = srcRect.width + 'px';
    fly.style.background = diskColor(disk);
    fly.style.left = srcRect.left + 'px';
    fly.style.top = srcRect.top + 'px';
    document.body.appendChild(fly);

    // Hide original
    srcDiskEl.style.opacity = '0';

    // Phase 1: lift up
    const dur1 = 120, dur2 = 180, dur3 = 120;
    fly.style.transition = `left ${dur2}ms cubic-bezier(.22,1,.36,1), top ${dur1}ms cubic-bezier(.33,1,.68,1)`;
    requestAnimationFrame(() => {
      fly.style.top = liftY + 'px';

      // Phase 2: move across after lift
      setTimeout(() => {
        fly.style.left = dstX + 'px';

        // Phase 3: drop down after crossing
        setTimeout(() => {
          fly.style.transition = `top ${dur3}ms cubic-bezier(.55,.06,.68,.19)`;
          fly.style.top = dstY + 'px';

          // Complete: update state and render
          setTimeout(() => {
            fly.remove();
            history.push({ from: fromIdx, to: toIdx });
            from.pop();
            to.push(disk);
            moves++;
            $('move-count').textContent = moves;
            $('undo-btn').disabled = false;
            selected = null;
            clearHints();
            animating = false;
            render();

            // Add landing bounce to the newly placed disk
            requestAnimationFrame(() => {
              const newTowerEls = document.querySelectorAll('.tower');
              const landedDisk = newTowerEls[toIdx]?.querySelector('.disk.top-disk');
              if (landedDisk) {
                landedDisk.classList.add('land');
                landedDisk.addEventListener('animationend', () => landedDisk.classList.remove('land'), { once: true });
              }
            });

            if (checkWin()) {
              clearInterval(timerInterval);
              showWin();
            }
          }, dur3);
        }, dur2);
      }, dur1);
    });
  } else {
    // Fallback: no animation
    history.push({ from: fromIdx, to: toIdx });
    from.pop();
    to.push(disk);
    moves++;
    $('move-count').textContent = moves;
    $('undo-btn').disabled = false;
    selected = null;
    clearHints();
    render();
    if (checkWin()) {
      clearInterval(timerInterval);
      showWin();
    }
  }
}

function handleClick(ti) {
  if (animating) return;
  clearHints();
  if (selected === null) {
    if (towers[ti].length === 0) return;
    selected = ti;
  } else if (selected === ti) {
    selected = null;
  } else {
    tryMove(selected, ti);
    return;
  }
  render();
}

function undo() {
  if (history.length === 0) return;
  const last = history.pop();
  const disk = towers[last.to].pop();
  towers[last.from].push(disk);
  moves++;
  $('move-count').textContent = moves;
  if (history.length === 0) $('undo-btn').disabled = true;
  selected = null;
  clearHints();
  render();
}

function checkWin() {
  return towers[2].length === diskCount;
}

function showWin() {
  const min = diskCount <= 30 ? (1 << diskCount) - 1 : Infinity;
  const m = Math.floor(seconds / 60);
  const s = (seconds % 60).toString().padStart(2, '0');
  let rating;
  if (min !== Infinity) {
    rating = moves === min ? 'Perfect score.' : moves <= min * 1.2 ? 'Excellent.' : 'Well done.';
  } else {
    rating = 'Impressive.';
  }
  const minStr = min !== Infinity ? ` Minimum was ${min.toLocaleString()}.` : '';
  $('win-msg').textContent = `${rating} ${moves.toLocaleString()} moves in ${m}:${s}.${minStr}`;
  $('win-overlay').classList.add('show');
  spawnConfetti();
}

function spawnConfetti() {
  const colors = ['#a78bfa','#f87171','#fbbf24','#34d399','#38bdf8','#f472b6','#fb923c','#e879f9','#a3e635'];
  const count = 60;
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.left = (Math.random() * 100) + 'vw';
    piece.style.top = '-10px';
    piece.style.setProperty('--drift-x', (Math.random() * 200 - 100) + 'px');
    piece.style.setProperty('--drift-y', (window.innerHeight + 50) + 'px');
    piece.style.setProperty('--spin', (Math.random() * 1080 - 540) + 'deg');
    piece.style.setProperty('--fall-duration', (2 + Math.random() * 1.5) + 's');
    piece.style.animationDelay = (Math.random() * 0.6) + 's';
    piece.style.width = (6 + Math.random() * 6) + 'px';
    piece.style.height = (6 + Math.random() * 6) + 'px';
    document.body.appendChild(piece);
    piece.addEventListener('animationend', () => piece.remove());
  }
}

// ── Hint system ──
function getOptimalMove() {
  const state = towers.map(t => [...t]);
  return solveStep(state, diskCount, 0, 2, 1);
}

function solveStep(state, n, from, to, aux) {
  if (n === 0) return null;
  const diskPos = findDisk(state, n);
  if (diskPos === to) {
    return solveStep(state, n - 1, from === to ? aux : from, to, from === to ? from : aux);
  }
  const actualAux = 3 - diskPos - to;
  const subResult = solveStep(state, n - 1, diskPos === from ? from : diskPos, actualAux, to);
  if (subResult !== null) return subResult;
  return { from: diskPos, to: to };
}

function findDisk(state, size) {
  for (let i = 0; i < 3; i++) {
    if (state[i].includes(size)) return i;
  }
  return -1;
}

function clearHints() {
  document.querySelectorAll('.tower').forEach(t => {
    t.classList.remove('hint-source', 'hint-target');
  });
}

function showHint() {
  clearHints();
  if (checkWin()) return;
  if (diskCount > 20) return; // too deep for recursion
  const move = getOptimalMove();
  if (!move) return;
  selected = null;
  render();
  setTimeout(() => {
    const towerEls = document.querySelectorAll('.tower');
    towerEls[move.from]?.classList.add('hint-source');
    towerEls[move.to]?.classList.add('hint-target');
  }, 50);
}

// ── Events ──
$('new-game').addEventListener('click', initGame);
$('play-again').addEventListener('click', initGame);
$('undo-btn').addEventListener('click', undo);
$('hint-btn').addEventListener('click', showHint);
$('disk-count').addEventListener('keydown', e => { if (e.key === 'Enter') initGame(); });

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === '1' || e.key === 'a') handleClick(0);
  else if (e.key === '2' || e.key === 'b') handleClick(1);
  else if (e.key === '3' || e.key === 'c') handleClick(2);
  else if (e.key === 'u' || (e.ctrlKey && e.key === 'z')) { e.preventDefault(); undo(); }
  else if (e.key === 'h') showHint();
  else if (e.key === 'n') initGame();
});

initGame();
</script>
