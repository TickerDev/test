<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Mr. Yee's Classroom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --surface-lowest: #ffffff;
    --surface: #f8f9fa;
    --surface-low: #f3f4f5;
    --surface-container: #edeeef;
    --surface-high: #e1e3e4;
    --on-surface: #191c1d;
    --on-surface-variant: #414754;
    --primary: #005bbf;
    --primary-container: #1a73e8;
    --on-primary: #ffffff;
    --outline-variant: rgba(193,198,214,.15);
    --ambient-shadow: rgba(25,28,29,.06);
    --radius-lg: 2rem;
    --radius-xl: 3rem;
    --radius-full: 9999px;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--surface);
    color: var(--on-surface);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Navbar ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255,255,255,.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .75rem 2.75rem;
  }
  nav .brand {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--on-surface);
    text-decoration: none;
    letter-spacing: -.02em;
  }
  nav .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }
  nav .nav-links a {
    font-size: .85rem;
    font-weight: 500;
    color: var(--on-surface-variant);
    text-decoration: none;
    transition: color .2s;
    letter-spacing: -.01em;
  }
  nav .nav-links a:hover { color: var(--primary); }
  nav .nav-links a.active { color: var(--primary); font-weight: 600; }

  /* ── Page header ── */
  .page-header {
    text-align: center;
    padding: 5rem 2.75rem 1rem;
  }
  .page-header h1 {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 3.5rem;
    font-weight: 700;
    letter-spacing: -.035em;
    line-height: 1.1;
    color: var(--on-surface);
  }
  .page-header p {
    margin-top: .75rem;
    font-size: 1rem;
    line-height: 1.6;
    color: var(--on-surface-variant);
  }

  /* ── Contact card ── */
  .contact-wrapper {
    display: flex;
    justify-content: center;
    padding: 2.5rem 2.75rem 5rem;
    flex: 1;
  }
  .contact-card {
    background: var(--surface-lowest);
    border-radius: var(--radius-xl);
    padding: 3.5rem;
    box-shadow: 0 8px 48px var(--ambient-shadow);
    max-width: 520px;
    width: 100%;
  }
  .contact-card h2 {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -.02em;
    color: var(--on-surface);
    margin-bottom: .5rem;
  }
  .contact-card > p {
    color: var(--on-surface-variant);
    font-size: .95rem;
    line-height: 1.6;
    margin-bottom: 2.5rem;
  }

  .form-group {
    margin-bottom: 1.5rem;
  }
  .form-group label {
    display: block;
    font-size: .75rem;
    font-weight: 600;
    color: var(--on-surface-variant);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: .5rem;
  }
  .form-group input,
  .form-group textarea {
    width: 100%;
    background: var(--surface-low);
    border: none;
    border-radius: var(--radius-lg);
    padding: .85rem 1.1rem;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: .9rem;
    color: var(--on-surface);
    outline: none;
    transition: background .2s, box-shadow .2s;
    resize: vertical;
  }
  .form-group input:focus,
  .form-group textarea:focus {
    background: var(--surface-lowest);
    box-shadow: 0 0 0 1.5px var(--primary);
  }
  .form-group textarea {
    min-height: 120px;
  }

  .btn {
    padding: .7rem 1.75rem;
    border-radius: var(--radius-full);
    font-weight: 600;
    border: none;
    cursor: pointer;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: .9rem;
    transition: all .2s;
    letter-spacing: -.01em;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }
  .btn-primary {
    background: var(--primary);
    color: var(--on-primary);
    box-shadow: 0 2px 40px var(--ambient-shadow);
  }
  .btn-primary:hover {
    background: var(--primary-container);
    box-shadow: 0 4px 48px rgba(25,28,29,.1);
  }

  /* ── Footer ── */
  footer {
    margin-top: auto;
    padding: 2.5rem 2.75rem 2rem;
    text-align: center;
    font-size: .75rem;
    color: var(--on-surface-variant);
    letter-spacing: .01em;
    line-height: 1.6;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .4rem;
  }
  footer .claude-icon {
    display: inline-flex;
    flex-shrink: 0;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    nav { padding: .75rem 1.5rem; }
    nav .nav-links { gap: 1.25rem; }
    .page-header { padding: 3.5rem 1.5rem 1rem; }
    .page-header h1 { font-size: 2.25rem; }
    .contact-wrapper { padding: 2rem 1.5rem 3rem; }
    .contact-card { padding: 2.5rem 1.75rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="home.html" class="brand">Mr. Yee's Classroom</a>
  <ul class="nav-links">
    <li><a href="home.html">Home</a></li>
    <li><a href="index.html">Game</a></li>
    <li><a href="pricing.html">Pricing</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
</nav>

<section class="page-header">
  <h1>Talk to Mr. Yee</h1>
  <p>Questions, feedback, or just want to say hello</p>
</section>

<div class="contact-wrapper">
  <div class="contact-card">
    <h2>Send a message</h2>
    <p>Fill out the form below and Mr. Yee will get back to you as soon as possible.</p>
    <form onsubmit="event.preventDefault(); this.reset(); alert('Message sent! Mr. Yee will get back to you soon.');">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Your name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" placeholder="What's on your mind?" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Send Message</button>
    </form>
  </div>
</div>

<footer>Built by Dor Elboim & <img class="claude-icon" src="https://raw.githubusercontent.com/lobehub/lobe-icons/refs/heads/master/packages/static-png/dark/claude-color.png" alt="Claude" width="16" height="16">Claude Opus (1M Context)</footer>

</body>
</html>
